<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compartir Fotos - Yury & Ronald</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-satinado {
            background-color: #0f2347;
            background-image: url('https://github.com/rov04i/bodayr/blob/main/Background%20blue.jpg?raw=true');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
        }
    </style>
</head>
<body class="bg-satinado min-h-screen flex flex-col items-center justify-start p-4 text-white">

    <div class="text-center my-6 select-none">
        <h1 class="font-serif text-2xl text-[#f9e2af] tracking-widest uppercase mb-1">Álbum de Recuerdos</h1>
        <p class="text-xs text-white/60 italic">Ayúdanos a capturar cada momento especial</p>
    </div>

    <div class="w-full max-w-md bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 shadow-2xl p-6 space-y-6">
        
        <form id="uploadForm" class="space-y-5">
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-white/50 mb-1.5 font-medium">Tu Nombre (Opcional)</label>
                <input type="text" id="guestName" placeholder="Ej. Familia Vásquez" 
                       class="w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/30 focus:outline-none focus:border-[#f9e2af] transition-colors">
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-wider text-white/50 mb-1.5 font-medium">Selecciona tus Fotos o Videos</label>
                <div class="relative group cursor-pointer border-2 border-dashed border-white/20 hover:border-[#f9e2af] rounded-xl p-6 text-center transition-colors bg-black/10">
                    <input type="file" id="fileInput" accept="image/*,video/*" multiple class="absolute inset-0 opacity-0 cursor-pointer">
                    
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#f9e2af" class="w-8 h-8 mx-auto mb-2 opacity-80 group-hover:scale-110 transition-transform">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                    
                    <p id="fileLabel" class="text-xs text-white/70">Presiona para abrir la galería o cámara</p>
                </div>
            </div>

            <button type="submit" id="submitBtn" 
                    class="w-full bg-[#f9e2af] hover:bg-[#e9d29f] text-[#0f2347] font-semibold text-sm py-3 px-4 rounded-xl shadow-lg shadow-yellow-950/20 active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
                <span>Enviar Recuerdos</span>
            </button>
        </form>

        <div id="statusMessage" class="hidden text-center text-xs p-3 rounded-xl"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        // Escucha y actualiza los archivos seleccionados
        fileInput.addEventListener('change', () => {
            const count = fileInput.files.length;
            if (count > 0) {
                fileLabel.textContent = count > 1 ? `${count} archivos seleccionados` : fileInput.files[0].name;
                fileLabel.classList.add('text-[#f9e2af]', 'font-medium');
            }
        });

        // Evento de Envío Remoto hacia Google Drive
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (fileInput.files.length === 0) {
                alert("Por favor, selecciona al menos una foto o video.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span>Subiendo recuerdos...</span>`;
            statusMessage.className = "text-center text-xs p-3 rounded-xl bg-white/5 text-[#f9e2af] animate-pulse";
            statusMessage.textContent = "Procesando y guardando tus capturas en el álbum de gala...";
            statusMessage.classList.remove('hidden');

            const files = fileInput.files;
            const guestName = document.getElementById('guestName').value || "Invitado Anónimo";
            let subidasExitosas = 0;

            // Bucle asíncrono para enviar cada archivo uno por uno por protocolo POST
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = async () => {
                        const base64Data = reader.result.split(',')[1];
                        
                        try {
                            const response = await fetch("https://script.google.com/macros/s/AKfycbyX9NPgxvyk3b2cGNAr2Hzf9mpg7zT7FY_kC36LBHVnJ-O1hruoCJm1Db9arFCa0lk/exec", {
                                method: "POST",
                                body: JSON.stringify({
                                    filename: file.name,
                                    mimeType: file.type,
                                    guest: guestName,
                                    data: base64Data
                                })
                            });
                            
                            const resData = await response.json();
                            if(resData.success) subidasExitosas++;
                        } catch (err) {
                            console.error("Error crítico en la subida:", err);
                        }
                        resolve();
                    };
                });
            }

            // Notificación final al concluir el bucle
            if(subidasExitosas > 0) {
                statusMessage.className = "text-center text-xs p-3 rounded-xl bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                statusMessage.textContent = `¡Muchas gracias! Se han guardado ${subidasExitosas} recuerdo(s) con éxito.`;
            } else {
                statusMessage.className = "text-center text-xs p-3 rounded-xl bg-rose-500/10 text-rose-400 border border-rose-500/20";
                statusMessage.textContent = "Hubo un inconveniente al procesar los archivos. Inténtalo de nuevo.";
            }

            uploadForm.reset();
            fileLabel.textContent = "Presiona para abrir la galería o cámara";
            fileLabel.classList.remove('text-[#f9e2af]', 'font-medium');
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<span>Enviar Recuerdos</span>`;
        });
    </script>
</body>
</html>
