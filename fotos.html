<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compartir Recuerdos - Yury & Samuel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap');
        
        .font-serif-gala {
            font-family: 'Cinzel', Georgia, serif;
        }
        .font-sans-gala {
            font-family: 'Montserrat', sans-serif;
        }
        .bg-satinado {
            background-color: #0b1528;
            background-image: url('https://github.com/rov04i/bodayr/blob/main/Background%20blue.jpg?raw=true');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
        }
        /* Estilo de la barra de desplazamiento interna */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #f9e2af;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-satinado font-sans-gala min-h-screen flex flex-col items-center justify-start p-4 text-white">

    <div class="text-center mt-8 mb-6 select-none max-w-sm px-2 animate-fade-in">
        <div class="inline-block border border-[#f9e2af]/40 rounded-full px-4 py-1 mb-3 bg-black/20 backdrop-blur-sm">
            <span class="font-serif-gala text-xs text-[#f9e2af] tracking-[0.3em] uppercase">Y & S</span>
        </div>
        <h1 class="font-serif-gala text-3xl md:text-4xl text-[#f9e2af] tracking-widest uppercase mb-2 font-bold drop-shadow-sm">
            Yury & Samuel
        </h1>
        <div class="h-[1px] w-24 bg-gradient-to-r from-transparent via-[#f9e2af]/60 to-transparent mx-auto my-3"></div>
        <p class="text-sm text-white/90 font-medium tracking-wide">Álbum Digital de Recuerdos</p>
    </div>

    <div class="w-full max-w-md bg-slate-950/45 backdrop-blur-xl rounded-3xl border border-white/15 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.6)] p-6 space-y-6">
        
        <div class="text-left border-b border-white/10 pb-4">
            <h2 class="font-serif-gala text-lg text-[#f9e2af] tracking-wider uppercase font-semibold">Cargar Fotos</h2>
            <p class="text-xs text-white/70 mt-0.5 font-light">Comparte con nosotros los mejores momentos de la boda.</p>
        </div>

        <form id="uploadForm" class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-wider text-white font-semibold mb-2">Nombre del Invitado</label>
                <input type="text" id="guestName" placeholder="Ej. Familia Vásquez" 
                       class="w-full bg-black/40 border-2 border-white/20 rounded-xl px-4 py-3.5 text-base text-white placeholder-white/40 focus:outline-none focus:border-[#f9e2af] transition-colors font-medium shadow-inner">
            </div>

            <div>
                <label class="block text-xs uppercase tracking-wider text-white font-semibold mb-2">Selecciona tus archivos</label>
                <div class="relative group cursor-pointer border-2 border-dashed border-white/30 hover:border-[#f9e2af] rounded-2xl p-8 text-center transition-all bg-black/20 hover:bg-black/30">
                    <input type="file" id="fileInput" accept="image/*,video/*" multiple class="absolute inset-0 opacity-0 cursor-pointer">
                    
                    <div class="w-14 h-14 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-3 border border-white/10 group-hover:border-[#f9e2af]/50 group-hover:bg-white/10 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#f9e2af" class="w-6 h-6 group-hover:scale-110 transition-transform">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
                        </svg>
                    </div>
                    
                    <p id="fileLabel" class="text-sm text-white font-medium">Presiona aquí para abrir la galería o cámara</p>
                    <p class="text-[11px] text-white/50 mt-1 font-light">Puedes seleccionar múltiples fotos o videos a la vez</p>
                </div>
            </div>

            <div id="progressContainer" class="hidden space-y-3 max-h-48 overflow-y-auto pr-1 bg-black/30 p-4 rounded-xl border border-white/10 custom-scroll">
                </div>

            <button type="submit" id="submitBtn" 
                    class="w-full bg-gradient-to-r from-[#f9e2af] to-[#e9d29f] text-[#0f2347] font-bold text-base py-4 px-4 rounded-xl shadow-lg shadow-yellow-950/40 active:scale-[0.98] hover:brightness-105 transition-all flex items-center justify-center space-x-2 cursor-pointer uppercase tracking-widest font-serif-gala">
                <span>Subir foto</span>
            </button>
        </form>

        <div id="statusMessage" class="hidden text-center text-sm p-4 rounded-xl font-bold transition-all"></div>
    </div>

    <div class="text-center mt-8 mb-4 opacity-40 text-[10px] tracking-widest uppercase select-none">
        &copy; 2026 Yury & Samuel
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const progressContainer = document.getElementById('progressContainer');
        const statusMessage = document.getElementById('statusMessage');

        // Escucha y actualiza los archivos seleccionados
        fileInput.addEventListener('change', () => {
            const count = fileInput.files.length;
            if (count > 0) {
                fileLabel.textContent = count > 1 ? `${count} archivos seleccionados` : fileInput.files[0].name;
                fileLabel.classList.remove('text-white');
                fileLabel.classList.add('text-[#f9e2af]', 'font-bold');
            }
        });

        // Evento de Envío Remoto Seguro
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (fileInput.files.length === 0) {
                alert("Por favor, selecciona al menos un archivo.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span>Subiendo archivos...</span>`;
            statusMessage.classList.add('hidden');
            
            progressContainer.innerHTML = '';
            progressContainer.classList.remove('hidden');

            const files = fileInput.files;
            const guestName = document.getElementById('guestName').value || "Invitado Anónimo";

            // Procesar los archivos uno por uno
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                
                const fileRowId = `file-row-${i}`;
                const barId = `bar-${i}`;
                const percentId = `percent-${i}`;
                
                const fileRow = document.createElement('div');
                fileRow.id = fileRowId;
                fileRow.className = "text-left text-sm bg-white/5 p-3 rounded-xl border border-white/5 space-y-2 transition-all duration-300";
                fileRow.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="truncate max-w-[70%] text-white font-semibold">${file.name}</span>
                        <span id="${percentId}" class="text-[#f9e2af] font-bold">0%</span>
                    </div>
                    <div class="w-full h-2 bg-white/10 rounded-full overflow-hidden">
                        <div id="${barId}" class="h-full bg-gradient-to-r from-[#f9e2af] to-[#e9d29f] transition-all duration-200" style="width: 0%;"></div>
                    </div>
                `;
                progressContainer.appendChild(fileRow);

                await new Promise((resolve) => {
                    const reader = new FileReader();
                    const progressBar = document.getElementById(barId);
                    const progressPercent = document.getElementById(percentId);
                    
                    let simulatedProgress = 0;
                    const progressInterval = setInterval(() => {
                        if (simulatedProgress < 90) {
                            simulatedProgress += 10;
                            progressBar.style.width = `${simulatedProgress}%`;
                            progressPercent.textContent = `${simulatedProgress}%`;
                        }
                    }, 100);

                    reader.readAsDataURL(file);
                    reader.onload = async () => {
                        clearInterval(progressInterval);
                        const base64Data = reader.result.split(',')[1];
                        
                        try {
                            // Enviar datos usando modo 'no-cors' para la conexión directa con Apps Script
                            await fetch("https://script.google.com/macros/s/AKfycbyX9NPgxvyk3b2cGNAr2Hzf9mpg7zT7FY_kC36LBHVnJ-O1hruoCJm1Db9arFCa0lk/exec", {
                                method: "POST",
                                mode: "no-cors", 
                                headers: {
                                    "Content-Type": "text/plain"
                                },
                                body: JSON.stringify({
                                    filename: file.name,
                                    mimeType: file.type,
                                    guest: guestName,
                                    data: base64Data
                                })
                            });
                            
                            // Éxito visual accesible
                            progressBar.style.width = '100%';
                            progressBar.className = "h-full bg-emerald-400";
                            progressPercent.textContent = "Listo";
                            progressPercent.className = "text-emerald-300 font-bold";
                            document.getElementById(fileRowId).className = "text-left text-sm bg-emerald-950/30 p-3 rounded-xl border border-emerald-500/20 space-y-2";
                            
                        } catch (err) {
                            progressBar.className = "h-full bg-rose-500";
                            progressPercent.textContent = "Error";
                            progressPercent.className = "text-rose-300 font-bold";
                            document.getElementById(fileRowId).className = "text-left text-sm bg-rose-950/30 p-3 rounded-xl border border-rose-500/20 space-y-2";
                        }
                        resolve();
                    };
                });
            }

            // Mensaje de éxito final adaptado de alta visibilidad
            statusMessage.className = "text-center text-sm p-4 rounded-xl bg-emerald-950/50 text-emerald-300 border border-emerald-500/40 font-bold";
            statusMessage.textContent = "Fotos subidas con éxito.";
            
            statusMessage.classList.remove('hidden');
            uploadForm.reset();
            fileLabel.textContent = "Presiona aquí para abrir la galería o cámara";
            fileLabel.classList.remove('text-[#f9e2af]', 'font-bold');
            fileLabel.classList.add('text-white');
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<span>Subir foto</span>`;
        });
    </script>
</body>
</html>
